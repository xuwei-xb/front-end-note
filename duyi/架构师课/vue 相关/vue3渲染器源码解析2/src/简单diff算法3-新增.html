<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn1">增加</button>
  </body>
  <script src="index.global.js"></script>
  <script>
    // Fragment片段类型
    const { effect, ref } = VueReactivity;
    const flag = ref(false);

    const isObject = (val) => {
      return val !== null && typeof val === "object";
    };
    const isArray = Array.isArray;
    const isString = (val) => {
      return typeof val === "string";
    };
    const onRE = /^on[^a-z]/;
    const isOn = (key) => onRE.test(key);

    function normalizeClass(value) {
      let res = "";
      if (isString(value)) {
        res = value;
      } else if (isArray(value)) {
        for (let i = 0; i < value.length; i++) {
          const normalized = normalizeClass(value[i]);
          if (normalized) {
            res += normalized + " ";
          }
        }
      } else if (isObject(value)) {
        for (const name in value) {
          if (value[name]) {
            res += name + " ";
          }
        }
      }
      return res.trim();
    }

    function shouldSetAsProps(el, key, value) {
      // 特殊处理
      if (key === "form" && el.tagName === "INPUT") return false;
      // 兜底
      return key in el;
    }

    const options = {
      createElement(tag) {
        return document.createElement(tag);
      },
      // 用于设置元素的文本节点
      setElementText(el, text) {
        el.textContent = text;
      },
      // 用于在给定的 parent 下添加指定元素
      insert(el, parent, anchor = null) {
        //在anchor之前插入 newNode(el) 的节点。
        // 如果为 null，newNode(el) 将被插入到节点的子节点列表末尾
        parent.insertBefore(el, anchor);
      },
      patchProps(el, key, prevValue, nextValue) {
        if (isOn(key)) {
          const eventName = key.slice(2).toLowerCase();
          // 定义el._vei为一个对象，这样就很方便的做到事件名称和对应函数的映射
          const invokers = el._vei || (el._vei = {});
          // 根据事件名称获取对应的函数
          let invoker = invokers[key];
          if (nextValue) {
            if (!invoker) {
              invoker = el._vei[key] = (e) => {
                // 如果时间发生事件，早于事件处理函数的绑定事件，就不执行
                if (e.timeStamp < invoker.attached) return;
                // 如果invoker.value是数组，那么就遍历数组，依次执行
                if (Array.isArray(invoker.value)) {
                  invoker.value.forEach((fn) => fn(e));
                } else {
                  invoker.value(e);
                }
              };

              invoker.value = nextValue;
              // 添加attached属性，存储时间处理函数被绑定的时间
              invoker.attached = performance.now();
              el.addEventListener(eventName, invoker);
            } else {
              invoker.value = nextValue;
            }
          } else if (invoker) {
            el.removeEventListener(eventName, invoker);
          }
        } else if (key === "class") {
          el.className = nextValue || "";
        } else if (shouldSetAsProps(el, key, nextValue)) {
          // 判断该DOM Properties的类型
          const type = typeof el[key];

          // 如果是布尔类型，并且value是空字符串'',那么就是设置为true
          if (type === "boolean" && nextValue === "") {
            el[key] = true;
          } else {
            el[key] = nextValue;
          }
        } else {
          // 如果key不存在在DOM Properties上，那么就是setAttribute
          el.setAttribute(key, nextValue);
        }
      },
      // 文本类型
      createText(text) {
        return document.createTextNode(text)
      },
      setText(el, text){
        el.textContent = text
      },
      // 注释内容
      createComment(text){
        return document.createComment(text)
      }
    };

    function createRenderer(options) {
      // 通过 options 得到操作 DOM 的 API
      const { 
        createElement, 
        insert, 
        setElementText, 
        patchProps,
        createText,
        setText,
        createComment
      } = options;

      function patchElement(oldVNode, newVNode) {
        const el = (newVNode.el = oldVNode.el),
          oldProps = oldVNode.props,
          newProps = newVNode.props;
        // 更新Props
        for (const key in newProps) {
          if (newProps[key] !== oldProps[key]) {
            patchProps(el, key, oldProps[key], newProps[key]);
          }
        }
        for (const key in oldProps) {
          if (!(key in newProps)) {
            patchProps(el, key, oldProps[key], null);
          }
        }
        // 更新子节点
        patchChildren(oldVNode, newVNode, el);
      }

      function patchChildren(oldVNode, newVNode, container) {
        // 新子节点的类型是文本节点
        if (typeof newVNode.children === "string") {
          // 如果旧子节点是一组子节点，循环遍历并且卸载
          if (Array.isArray(oldVNode.children)) {
            oldVNode.children.forEach((child) => {
              unmount(child);
            });
          }

          // 如果旧子节点是文本节点或者没有子节点，直接更新文本内容
          setElementText(container, newVNode.children);
        }
        // 新子节点的类型是数组，也就是一组子节点
        else if (Array.isArray(newVNode.children)) {
          const oldChildren = oldVNode.children;
          const newChildren = newVNode.children;

          // 存储寻找过程中遇到的最大索引值
          let lastIndex = 0;
          for (let i = 0; i < newChildren.length; i++) {
            const n = newChildren[i];
            // 是否找到对应的旧节点，很常规的boolean开关处置
            let find = false;
            // 遍历旧的children
            for(let j=0; j<oldChildren.length; j++){
              const o = oldChildren[j];
              // 如果新旧节点的key相同，那么就是同一个节点，直接打补丁
              if(n.key === o.key){
                // 找到对应的旧节点，boolean开关设置为true
                find = true;
                patch(o, n, container);
                if(j < lastIndex){
                  // 获取新子节点的前一个节点
                  const prevVNode = newChildren[i - 1];
                  // 如果不存在，说明是第一个节点，不需要处理
                  if(prevVNode){
                    // 获取子节点的真实DOM元素的下一个节点（注意这里是旧子节点对应的DOM引用）
                    const anchor = prevVNode.el.nextSibling;
                    // 移动节点
                    insert(n.el, container, anchor);
                  }
                } else {
                  // 更新lastIndex
                  lastIndex = j;
                }
                break;
              }
            }
            
            // 上面循环完毕，如果find还是为false，说明新节点在旧节点中不存在，那么就是新增节点
            if(!find){
              // 获取当前newVNode的前一个节点
              const preVNode = newChildren[i - 1];
              let anchor = null;
              if(preVNode){
                // 如果有前一个节点，使用它的下一个相邻兄弟元素作为锚点
                anchor = preVNode.el.nextSibling;
              }
              else{
                // 如果没有前一个节点，那么就是第一个节点
                anchor = container.firstChild;
              }

              // 挂载新节点
              // 注意之前patch函数没有第四个参数，需要改造一下
              patch(null, n, container, anchor);
            }
          }
        }
        // 新子节点不存在
        else {
          // 如果运行到这里，说明新子节点不存在
          // 如果旧子节点是一组子节点，循环遍历并且卸载
          if (Array.isArray(oldVNode.children)) {
            oldVNode.children.forEach((child) => {
              unmount(child);
            });
          }
          // 如果旧子节点是文本节点,直接清空
          else if (typeof oldVNode.children === "string") {
            setElementText(container, "");
          }
        }
      }

      function mountElement(vnode, container, anchor) {
        // 让 vnode.el 引用真实 DOM 元素
        const el = (vnode.el = createElement(vnode.type));
        if (typeof vnode.children === "string") {
          // 如果子节点是字符串，说明它是文本节点
          setElementText(el, vnode.children);
        } else if (Array.isArray(vnode.children)) {
          // 如果子节点是数组，说明它是多个子节点，遍历子节点，并且通过patch挂载它们
          vnode.children.forEach((child) => {
            patch(null, child, el);
          });
        }

        // 如果存在props属性，遍历props属性，并且将其设置到el上
        if (vnode.props) {
          for (const key in vnode.props) {
            const value = vnode.props[key];
            patchProps(el, key, null, value);
          }
        }

        insert(el, container, anchor);
      }

      function patch(oldVNode, newVNode, container, anchor = null) {
        if (oldVNode && oldVNode.type !== newVNode.type) {
          // 如果新旧 vnode 的类型不同，则直接将旧 vnode 卸载
          unmount(oldVNode);
          oldVNode = null;
        }
        const { type } = newVNode;
        // 如果类型是字符串，说明描述的是普通标签
        if (typeof type === "string") {
          // 如果旧节点不存在，就意味着是挂载，调用mountElement函数完成挂载
          if (!oldVNode) {
            mountElement(newVNode, container, anchor);
          } else {
            // 如果oldVNode存在，意味着更新，暂时省略......
            console.log("打补丁");
            patchElement(oldVNode, newVNode);
          }
        } else if(type === Text){
          // 如果没有旧节点，直接进行挂载
          if(!oldVNode){
            // 创建文本节点
            const el = (newVNode.el = createText(newVNode.children));
            // 插入文本节点
            insert(el, container);
          } else {
            // 如果新旧节点都存在，更新文本内容
            const el = (newVNode.el = oldVNode.el);
            if(newVNode.children !== oldVNode.children){
              setText(el, newVNode.children);
            }
          }
          
        } else if(type === Comment){
          // 如果没有旧节点，直接进行挂载
          if(!oldVNode){
            // 创建注释节点
            const el = (newVNode.el = createComment(newVNode.children));
            // 插入注释节点
            insert(el, container);
          } else {
            // 如果新旧节点都存在，更新注释内容
            const el = (newVNode.el = oldVNode.el);
            if(newVNode.children !== oldVNode.children){
              setText(el, newVNode.children);
            }
          }
        } else if(type === Fragment){
          if(!oldVNode){
            // 如果旧vnode不存在，那么就是将Fragment的children逐个直接挂载
            newVNode.children.forEach(child => patch(null, child, container));
          }
          else{
            // 如果旧vnode存在，那么就是更新Fragment的children
            // 我们可以直接调用patchChildren函数
            patchChildren(oldVNode, newVNode, container);
          }
        } else if (typeof type === "object") {
          // todo:组件
          console.log("组件处理");
        } else {
          // todo:未知类型
          console.log("未知类型");
        }
      }

      function unmount(vnode) {
        // 卸载时，如果卸载的是Fragment，那么就需要递归卸载children
        if(vnode.type === Fragment){
          vnode.children.forEach(child => unmount(child));
          return;
        }

        const parent = vnode.el.parentNode;
        if (parent) {
          parent.removeChild(vnode.el);
        }
      }

      function render(vnode, container) {
        if (vnode) {
          // 如果新vnode存在，将其与旧vnode一起传递给patch函数，进行更新(打补丁)
          patch(container._vnode, vnode, container);
        } else {
          if (container._vnode) {
            unmount(container._vnode);
          }
        }

        // 将vnode存储到container._vnode下，在后续的渲染中代表旧的vnode
        container._vnode = vnode;
      }

      return {
        render,
      };
    }

    const Text = Symbol('Text') // 文本类型Symbol
    const Comment = Symbol('Comment') // 注释类型Symbol
    const Fragment = Symbol('Fragment') // 片段类型Symbol
    
    const oldVNode = {
      type: 'div',
      children: [
        { type: 'p', children: '1', key: 1 },
        { type: 'p', children: '2', key: 2 },
        { type: 'p', children: 'hello', key: 3 }
      ]
    }

    const newVNode = {
      type: 'div',
      children: [
        { type: 'p', children: 'world', key: 3 },
        { type: 'p', children: '1', key: 1 },
        { type: 'p', children: '4', key: 4 },
        { type: 'p', children: '2', key: 2}
      ]
    }
    

    const renderer = createRenderer(options);
    // 首次挂载
    renderer.render(oldVNode, document.getElementById("app"));

    // 1秒后更新
    setTimeout(() => {
      renderer.render(newVNode, document.getElementById("app"));
    }, 1000);
  </script>
</html>
